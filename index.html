<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECE Tooling Hub - KTU Companion</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@100;400;700&display=swap');

    :root { --font-sans: 'Outfit', sans-serif; --font-mono: 'JetBrains Mono', monospace; }
    
    body { 
      font-family: var(--font-sans); 
      overflow-x: hidden; 
      transition: background-color 0.5s ease, color 0.5s ease; 
      -webkit-font-smoothing: antialiased; 
      background-color: #FAFAFA;
      color: #0F172A; /* Much darker base text for light mode */
    }

    body.dark { 
      background-color: #0B0F19; 
      color: #F8FAFC; 
    }
    
    .font-mono { font-family: var(--font-mono) !important; }

    /* Animated Ambient Backgrounds */
    @keyframes ambientPan {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .bg-ambient-light { 
      background: 
        radial-gradient(circle at 0% 0%, rgba(238, 242, 255, 1) 0%, transparent 50%),
        radial-gradient(circle at 100% 0%, rgba(255, 241, 242, 1) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(240, 253, 250, 1) 0%, transparent 50%),
        radial-gradient(circle at 0% 100%, rgba(250, 245, 255, 1) 0%, transparent 50%),
        #F8FAFC;
    }
    
    .bg-ambient-dark { 
      background: 
        radial-gradient(circle at 0% 0%, rgba(30, 27, 75, 1) 0%, transparent 50%),
        radial-gradient(circle at 100% 0%, rgba(76, 29, 149, 0.4) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(15, 118, 110, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 0% 100%, rgba(23, 37, 84, 0.6) 0%, transparent 50%),
        #020617;
      background-size: 200% 200%;
      animation: ambientPan 25s ease-in-out infinite;
    }

    /* Mesmerizing Colourful Theme */
    .bg-ambient-colourful {
      background: 
        radial-gradient(circle at 15% 50%, rgba(236, 72, 153, 0.5) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(6, 182, 212, 0.5) 0%, transparent 50%),
        radial-gradient(circle at 50% 85%, rgba(234, 179, 8, 0.4) 0%, transparent 50%),
        radial-gradient(circle at 80% 90%, rgba(139, 92, 246, 0.5) 0%, transparent 50%),
        #fdf2f8;
      background-size: 150% 150%;
      animation: ambientPan 15s ease-in-out infinite alternate;
      color: #0F172A;
    }
    body.colourful * { border-color: rgba(255,255,255,0.4) !important; }
    body.colourful .bg-white\/95, body.colourful .bg-white\/90 { 
      background-color: rgba(255, 255, 255, 0.5) !important; 
      backdrop-filter: blur(32px) !important;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1) !important;
    }
    body.colourful .bg-slate-50, body.colourful .bg-slate-100 { background-color: rgba(255, 255, 255, 0.3) !important; }
    body.colourful .text-slate-500, body.colourful .text-slate-600 { color: #334155 !important; }
    body.colourful .text-slate-700, body.colourful .text-slate-800, body.colourful .text-slate-900 { color: #0F172A !important; font-weight: 600; }

    /* True Matrix Hacker Theme Overrides */
    body.matrix {
      background-color: #050505 !important;
      background-image: 
        linear-gradient(rgba(34, 197, 94, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34, 197, 94, 0.08) 1px, transparent 1px) !important;
      background-size: 30px 30px !important;
      color: #4ade80 !important;
    }
    body.matrix * { border-color: rgba(34, 197, 94, 0.4) !important; }
    body.matrix .bg-white\/95, body.matrix .bg-white\/90, body.matrix .bg-white\/80, body.matrix .bg-slate-50, body.matrix .bg-slate-100 { 
      background-color: rgba(5, 5, 5, 0.95) !important; color: #4ade80 !important; backdrop-filter: none !important; box-shadow: none !important;
    }
    body.matrix .text-slate-800, body.matrix .text-slate-900, body.matrix .text-slate-700, body.matrix .text-slate-600, body.matrix .text-slate-500, body.matrix .text-violet-600, body.matrix .text-violet-500 { color: #4ade80 !important; }
    body.matrix .bg-violet-500, body.matrix .bg-violet-600 { background-color: #14532d !important; color: #4ade80 !important; }
    body.matrix .bg-violet-50, body.matrix .bg-violet-100 { background-color: rgba(20, 83, 45, 0.3) !important; }
    body.matrix input, body.matrix select { background-color: #000 !important; color: #4ade80 !important; }

    /* Scrollbars & Controls */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.4); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.6); }
    
    input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
    input[type=range]:focus { outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 22px; width: 22px; border: 4px solid white; border-radius: 50%; background: currentColor; cursor: pointer; margin-top: -9px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2); transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .dark input[type=range]::-webkit-slider-thumb, .matrix input[type=range]::-webkit-slider-thumb { border-color: #1E293B; }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.15); }
    input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: rgba(148, 163, 184, 0.4); border-radius: 4px; }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .animate-blink { animation: blink 2s ease-in-out infinite; }

    .news-content p { margin-bottom: 1.2rem; line-height: 1.8; color: inherit; }
    .news-content img { max-width: 100%; height: auto; border-radius: 16px; margin: 1.5rem 0; max-height: 400px; object-fit: cover; }
    .news-content a { text-decoration: none; color: #8B5CF6; font-weight: 600; transition: color 0.2s; }
  </style>
</head>

    // ==========================================
    // OPTIMIZED DYNAMIC BACKGROUND ENGINE
    // ==========================================
    const ContextAmbientEngine = ({ theme, enabled, activeTab }) => {
      const canvasRef = useRef(null);

      useEffect(() => {
        if (!enabled || theme === 'matrix') return;
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let animationFrameId;
        let elements = [];
        let time = 0;
        
        const resize = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          initElements();
        };

        const isDark = theme === 'dark';
        const isColor = theme === 'colourful';
        // Use soft white orbs for colorful theme, otherwise purple/indigo
        const baseColor = isColor ? '255, 255, 255' : (isDark ? '139, 92, 246' : '99, 102, 241');
        
        const initElements = () => {
          elements = [];
          const w = canvas.width; const h = canvas.height;
          if (activeTab === 'tools' || activeTab === 'about') {
            // Capped at 35 particles to eliminate lag entirely
            const num = Math.min(35, Math.floor((w * h) / 25000)); 
            for (let i = 0; i < num; i++) {
              elements.push({ x: Math.random() * w, y: Math.random() * h, vx: (Math.random() - 0.5) * 0.15, vy: (Math.random() - 0.5) * 0.15, radius: Math.random() * 1.5 + 1 });
            }
          } else if (activeTab === 'news') {
            const columns = Math.floor(w / 35); // wider spacing
            for (let i = 0; i < columns; i++) {
              elements.push({ x: i * 35, y: Math.random() * h, speed: Math.random() * 1 + 0.5, length: Math.random() * 10 + 5 });
            }
          } else if (activeTab === 'timetable') {
            for (let i = 0; i < 10; i++) {
              elements.push({ x: Math.random() * w, y: Math.random() * h, width: Math.random() * 120 + 60, speed: Math.random() * 0.2 + 0.1 });
            }
          } else if (activeTab === 'dashboard') {
            for (let i = 0; i < 4; i++) {
              elements.push({ x: Math.random() * w, y: Math.random() * h, vx: (Math.random() - 0.5) * 0.1, vy: (Math.random() - 0.5) * 0.1, radius: Math.random() * 100 + 80 });
            }
          } else if (activeTab === 'calc') {
            for (let i = 0; i < 15; i++) {
              elements.push({ x: Math.random() * w, y: h + Math.random() * 500, speed: Math.random() * 0.4 + 0.2, radius: Math.random() * 10 + 5 });
            }
          }
        };

        const draw = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          time += 0.01;

          if (activeTab === 'tools' || activeTab === 'about') {
            ctx.fillStyle = `rgba(${baseColor}, 0.5)`;
            elements.forEach(p => {
              p.x += p.vx; p.y += p.vy;
              if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
              if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
              ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
            });
            // Optimized O(n^2) connection line loop
            ctx.lineWidth = 1;
            for (let i = 0; i < elements.length; i++) {
              for (let j = i + 1; j < elements.length; j++) {
                const dx = elements[i].x - elements[j].x;
                const dy = elements[i].y - elements[j].y;
                const distSq = dx*dx + dy*dy;
                if (distSq < 22500) { // 150*150
                  const dist = Math.sqrt(distSq);
                  ctx.globalAlpha = 0.15 * (1 - dist / 150);
                  ctx.strokeStyle = `rgb(${baseColor})`;
                  ctx.beginPath(); ctx.moveTo(elements[i].x, elements[i].y); ctx.lineTo(elements[j].x, elements[j].y); ctx.stroke();
                }
              }
            }
            ctx.globalAlpha = 1.0;
          } else if (activeTab === 'news') {
            ctx.font = '14px monospace';
            elements.forEach(drop => {
              for(let k=0; k<drop.length; k++) {
                ctx.globalAlpha = (1 - (k/drop.length)) * 0.3;
                ctx.fillStyle = `rgb(${baseColor})`;
                ctx.fillText(Math.random() > 0.5 ? '1' : '0', drop.x, drop.y - (k*20));
              }
              drop.y += drop.speed;
              if (drop.y - (drop.length*20) > canvas.height) { drop.y = 0; drop.speed = Math.random() * 1 + 0.5; }
            });
            ctx.globalAlpha = 1.0;
          } else if (activeTab === 'lab') {
            for (let i = 0; i < 3; i++) {
              ctx.beginPath();
              for (let x = 0; x < canvas.width; x += 15) {
                const y = canvas.height/2 + Math.sin(x * 0.003 + time + i) * 100 * (i+1)/3;
                if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
              }
              ctx.strokeStyle = `rgba(${baseColor}, ${0.1 + i*0.05})`;
              ctx.lineWidth = 2;
              ctx.stroke();
            }
          } else if (activeTab === 'dashboard') {
            elements.forEach(orb => {
              orb.x += orb.vx; orb.y += orb.vy;
              if (orb.x < -orb.radius || orb.x > canvas.width + orb.radius) orb.vx *= -1;
              if (orb.y < -orb.radius || orb.y > canvas.height + orb.radius) orb.vy *= -1;
              const grad = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, orb.radius);
              grad.addColorStop(0, `rgba(${baseColor}, 0.15)`);
              grad.addColorStop(1, 'transparent');
              ctx.beginPath(); ctx.arc(orb.x, orb.y, orb.radius, 0, Math.PI * 2); 
              ctx.fillStyle = grad; ctx.fill();
            });
          } else if (activeTab === 'timetable') {
            ctx.fillStyle = `rgba(${baseColor}, 0.04)`;
            elements.forEach(b => {
              b.x += b.speed;
              if (b.x > canvas.width) { b.x = -b.width; b.y = Math.random() * canvas.height; }
              ctx.fillRect(b.x, b.y, b.width, 15);
            });
          } else if (activeTab === 'calc') {
            ctx.strokeStyle = `rgba(${baseColor}, 0.2)`;
            elements.forEach(b => {
              b.y -= b.speed;
              if (b.y < -50) { b.y = canvas.height + 50; b.x = Math.random() * canvas.width; }
              ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2); ctx.stroke();
            });
          }

          animationFrameId = requestAnimationFrame(draw);
        };

        window.addEventListener('resize', resize);
        resize();
        draw();

        return () => { window.removeEventListener('resize', resize); cancelAnimationFrame(animationFrameId); };
      }, [theme, enabled, activeTab]);

      if (!enabled || theme === 'matrix') return null;
      return <canvas ref={canvasRef} className="fixed inset-0 pointer-events-none z-0 opacity-100 transition-opacity duration-1000" />;
    };

      const [schedule, setSchedule] = useState(() => {
        try { const saved = localStorage.getItem('ece_timetable'); return saved ? JSON.parse(saved) : defaultSchedule; } catch(e) { return defaultSchedule; }
      });
      
      const [numPeriods, setNumPeriods] = useState(() => {
        return Math.max(...Object.values(schedule).map(arr => arr.length), 4);
      });

      const updatePeriod = (day, index, val) => {
        const newDay = [...schedule[day]]; newDay[index] = val; setSchedule({...schedule, [day]: newDay});
      };
      
      const saveTimetable = () => { localStorage.setItem('ece_timetable', JSON.stringify(schedule)); showToast("Timetable saved locally."); };

      const addPeriod = () => {
        const newSch = {...schedule}; Object.keys(newSch).forEach(d => newSch[d].push("")); setSchedule(newSch); setNumPeriods(n => n + 1);
      };

      const removePeriod = () => {
        if(numPeriods <= 1) return; const newSch = {...schedule}; Object.keys(newSch).forEach(d => newSch[d].pop()); setSchedule(newSch); setNumPeriods(n => n - 1);

            ))}

            {activeLab === 'cro' && <CROVisualizer animations={animations} />}
            {activeLab === 'rect' && <RectifierVisualizer animations={animations} />}
            {activeLab === 'frect' && <FullRectifierVisualizer animations={animations} />}
            {activeLab === 'zener' && <ZenerVisualizer />}
            {activeLab === 'ohms' && <OhmsLawVisualizer />}
            {activeLab === 'filter' && <BodePlotVisualizer />}
            {activeLab === 'reson' && <ResonanceVisualizer />}
            {activeLab === 'transformer' && <TransformerVisualizer />}
            {activeLab === 'gates' && <LogicGatesVisualizer />}
          </div>
        </div>
      );
    };

    const CROVisualizer = ({ animations }) => {
      const [isPlaying, setIsPlaying] = useState(true);
      const [chA, setChA] = useState({ amp: 2.5, freq: 40 });
      const canvasRef = useRef(null); const animRef = useRef(null); const timeRef = useRef(0);

      useEffect(() => {
        const canvas = canvasRef.current; if (!canvas) return;
        const ctx = canvas.getContext('2d'); if (!ctx) return;
        const draw = () => {
          const { width, height } = canvas; ctx.clearRect(0, 0, width, height);
          if (isPlaying && animations) timeRef.current += 0.005;
          ctx.beginPath(); ctx.strokeStyle = '#10B981'; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
          for (let x = 0; x < width; x++) {
            const t = (x / width) * 0.1 + timeRef.current; 
            const y = (height / 2) - (chA.amp * 20 * Math.sin(2 * Math.PI * chA.freq * t));
            if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
          }
          ctx.stroke(); animRef.current = requestAnimationFrame(draw);
        };
        animRef.current = requestAnimationFrame(draw);
        return () => { if (animRef.current) cancelAnimationFrame(animRef.current); };
      }, [isPlaying, chA, animations]);

      return (
        <Widget title="Alternating Current Waves" icon={Monitor}>
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">

              <div className="absolute top-1/2 left-0 w-full h-px bg-sky-500/50"></div>
              <div className="absolute top-0 left-1/2 w-px h-full bg-sky-500/50"></div>
              <canvas ref={canvasRef} width={800} height={360} className="absolute inset-0 w-full h-full z-10 drop-shadow-[0_0_4px_rgba(16,185,129,0.8)]" />
              <button onClick={() => setIsPlaying(!isPlaying)} className="absolute bottom-5 right-5 z-20 bg-slate-900/80 text-emerald-400 p-4 border border-slate-700 rounded-2xl shadow-xl hover:scale-110 transition-transform">
                {isPlaying ? <Pause className="w-5 h-5 fill-current" /> : <Play className="w-5 h-5 fill-current" />}
              </button>
            </div>
            <div className="bg-slate-50 dark:bg-slate-900 p-8 rounded-3xl flex flex-col justify-center border border-slate-200 dark:border-slate-800 shadow-sm text-slate-900 dark:text-slate-200">
              <h4 className="font-bold mb-10 flex items-center tracking-wide"><Zap className="w-5 h-5 mr-3 text-violet-600 dark:text-violet-500" /> Signal Control</h4>
              <div className="space-y-10">

    const DiodeVisualizer = () => {

        for(let v=0; v<=1; v+=0.02) {
          let i = v > 0.5 ? Math.pow((v - 0.5) * 2, 3) * 20 : 0; 
          pts.push(`${v * 100},${100 - (i / 20) * 100}`);
        }
        return `M 0,100 L ${pts.join(' L ')}`;
      };
      const currentI = vd > 0.5 ? Math.pow((vd - 0.5) * 2, 3) * 20 : 0;

                  <path d={buildPath()} fill="none" stroke="#3b82f6" strokeWidth="2.5" />
                  <circle cx={vd*100} cy={100 - (currentI/20)*100} r="3" fill="#ef4444" className="transition-all duration-200 shadow-md" />

    const LogicGatesVisualizer = () => {
      const [inputs, setInputs] = useState([0, 0]);
      const addInput = () => { if (inputs.length < 5) setInputs([...inputs, 0]); };
      const removeInput = () => { if (inputs.length > 2) setInputs(inputs.slice(0, -1)); };
      const toggleInput = (index) => { const newInputs = [...inputs]; newInputs[index] = newInputs[index] === 0 ? 1 : 0; setInputs(newInputs); };

      const calcAND = inputs.every(v => v === 1) ? 1 : 0;
      const calcOR = inputs.some(v => v === 1) ? 1 : 0;
      const calcNAND = calcAND === 1 ? 0 : 1;
      const calcNOR = calcOR === 1 ? 0 : 1;
      const calcXOR = inputs.reduce((acc, val) => acc ^ val, 0);
      const calcXNOR = calcXOR === 1 ? 0 : 1;

      const inputLabels = ['A', 'B', 'C', 'D', 'E'];

      return (
        <Widget title="Digital Boolean Logic" icon={GitBranch}>

                <button onClick={addInput} disabled={inputs.length >= 5} className="w-10 h-10 flex items-center justify-center rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 disabled:opacity-30 hover:shadow-md transition-all text-slate-700 dark:text-slate-300"><span className="text-2xl font-mono font-bold leading-none pb-1">+</span></button>
              </div>
              <div className="flex flex-wrap justify-center gap-6 mb-8 mt-10 z-10">
                {inputs.map((val, idx) => (
                  <div key={idx} className="flex flex-col items-center space-y-4">
                    <button onClick={() => toggleInput(idx)} className={`w-20 h-20 sm:w-24 sm:h-24 rounded-full border-[4px] flex items-center justify-center text-4xl sm:text-5xl font-mono font-bold transition-all duration-300 shadow-xl ${val === 1 ? 'border-violet-500 bg-violet-500 text-white shadow-violet-500/40 scale-110' : 'bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-400 hover:border-violet-300 dark:hover:border-violet-600'}`}>{val}</button>

                  </div>
                ))}

            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">

                { name: 'AND', val: calcAND, color: 'text-blue-600 dark:text-blue-500', bg: 'bg-blue-500' }, { name: 'OR', val: calcOR, color: 'text-emerald-600 dark:text-emerald-500', bg: 'bg-emerald-500' },
                { name: 'NAND', val: calcNAND, color: 'text-rose-600 dark:text-rose-500', bg: 'bg-rose-500' }, { name: 'NOR', val: calcNOR, color: 'text-amber-600 dark:text-amber-500', bg: 'bg-amber-500' },

                        <span className="text-slate-600 dark:text-slate-400 text-xs font-medium">{subj.name}</span>

                      <select className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl py-2 px-5 text-base font-bold outline-none cursor-pointer focus:border-violet-500 transition-colors shadow-sm text-slate-900 dark:text-slate-200" value={grades[subj.code]} onChange={(e) => setGrades({...grades, [subj.code]: e.target.value})}>

                <div className="w-full lg:w-96 bg-gradient-to-br from-violet-500 to-indigo-600 rounded-3xl flex flex-col items-center justify-center p-10 shadow-xl shadow-violet-500/20 text-white">

            <div className="absolute top-0 right-0 w-64 h-64 bg-violet-500/10 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2 transition-all duration-700"></div>

        case 'SET_THEME': return { ...state, theme: action.payload };
        case 'SET_TAB': return { ...state, activeTab: action.payload, isSidebarOpen: false }; 
        case 'TOGGLE_ANIMATIONS': return { ...state, animations: !state.animations };
        case 'TOGGLE_SIDEBAR': return { ...state, isSidebarOpen: !state.isSidebarOpen };
        default: return state;
      }
    }

      <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-4 rounded-full font-bold text-xs uppercase tracking-widest z-50 flex items-center shadow-2xl animate-in slide-in-from-bottom-10 fade-in">
        <span>{message}</span><button onClick={onClose} className="ml-4 opacity-50 hover:opacity-100"><X className="w-4 h-4" /></button>
      </div>
    );

      const [state, dispatch] = useReducer(reducer, initialState);
      const [toast, setToast] = useState(null);

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 4000); };

      useEffect(() => {
        const root = document.documentElement;
        const body = document.body;
        root.classList.remove('light', 'dark');
        body.classList.remove('matrix');
        body.classList.remove('colourful');
        
        if (state.theme === 'dark') {
          root.classList.add('dark');
        } else if (state.theme === 'light') {
          root.classList.add('light');
        } else if (state.theme === 'matrix') {
          root.classList.add('dark'); 
          body.classList.add('matrix'); 
        } else if (state.theme === 'colourful') {
          root.classList.add('light'); 
          body.classList.add('colourful'); 
        }
      }, [state.theme]);

      const getBackgroundClass = () => {
        if (state.theme === 'matrix') return 'bg-matrix';
        if (state.theme === 'dark') return 'bg-ambient-dark'; 
        if (state.theme === 'colourful') return 'bg-ambient-colourful'; 
        return 'bg-ambient-light';

              <div className="flex items-center space-x-5">
                <button onClick={() => dispatch({ type: 'TOGGLE_SIDEBAR' })} className="p-3 bg-white dark:bg-slate-900 border border-slate-200/80 dark:border-slate-800/80 rounded-xl hover:shadow-sm transition-all active:scale-95 text-slate-700 dark:text-slate-300"><Menu className="w-5 h-5" /></button>
                <div className="hidden sm:flex flex-col border-l-2 border-slate-200 dark:border-slate-700 pl-5">
                  <span className="font-bold tracking-[0.2em] uppercase text-base text-slate-900 dark:text-white leading-none">{APP_CONFIG.name}</span>
                  <span className="text-[10px] font-bold text-slate-600 dark:text-slate-400 uppercase mt-2 leading-none tracking-widest">{APP_CONFIG.university}</span>
                </div>
              </div>
              <div className="flex items-center space-x-5">
                <span className="hidden md:inline text-xs font-bold uppercase tracking-widest text-slate-600 dark:text-slate-400">{TABS.find(t => t.id === state.activeTab).label}</span>
              </div>
            </div>
          </header>

          <main className="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 md:px-8 py-10 relative z-10 transition-all duration-500 flex flex-col">
             {state.activeTab === 'news' && <NewsHubView showToast={showToast} />}
             {state.activeTab === 'dashboard' && <DashboardView />}
             {state.activeTab === 'timetable' && <TimetableView showToast={showToast} />}
             {state.activeTab === 'tools' && <ToolsView />}
             {state.activeTab === 'lab' && <VirtualLabManager animations={state.animations} />}
             {state.activeTab === 'calc' && <SGPAView />}
             {state.activeTab === 'about' && <AboutView state={state} dispatch={dispatch} />}
          </main>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NexusApp />);
  </script>
</body>
</html>
